name: Node.js CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Correcciones automáticas
      - name: Auto-fix lint issues
        run: npm run lint -- --fix

      - name: Auto-format code
        run: npm run format

      # Validaciones
      - name: Run lint check
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
        env:
          API_NINJAS_KEY: ${{ secrets.API_NINJAS_KEY }}
          ZEGO_APP_ID: ${{ secrets.ZEGO_APP_ID }}
          ZEGO_SERVER_SECRET: ${{ secrets.ZEGO_SERVER_SECRET }}
